{% set version = "2.0.8" %}

package:
  name: libxfont2
  version: {{ version }}

source:
  url: https://www.x.org/releases/individual/lib/libXfont2-{{ version }}.tar.xz
  sha256: f556c0e1093a4e6911cc90bc4b106d201902ee187fd74af206ff162f7e6a24d5

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('libxfont2', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - pkg-config
  host:
    - xorg-xorgproto
    - xorg-xtrans
    - libfontenc
    - freetype
    - zlib

test:
  commands:
    - test -f "${PREFIX}/lib/libXfont2${SHLIB_EXT}"
    - test -f "${PREFIX}/lib/pkgconfig/xfont2.pc"

about:
  home: https://www.x.org/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: X.Org server-side font rendering library (libXfont2)
  description: |
    libXfont2 provides the core server-side font support used by the X.Org
    server and its DDXes (such as Xvfb). It also ships a small set of
    compiled-in "built-in" fonts (fixed, cursor, 6x13), which allow an X
    server to start without any external font packages installed.
  dev_url: https://gitlab.freedesktop.org/xorg/lib/libxfont

extra:
  recipe-maintainers:
    - hmaarrfk
